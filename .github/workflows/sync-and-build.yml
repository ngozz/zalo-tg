name: Sync Upstream & Build Multi-Arch Docker Image

on:
  schedule:
    # Runs at 18:00 UTC every day, which is exactly 01:00 AM UTC+7
    - cron: '0 18 * * *'
  workflow_dispatch: # Allows you to trigger the workflow manually for testing

permissions:
  contents: write    # Required to push synced commits back to your fork
  packages: write    # Required to push the Docker image to GitHub Packages

jobs:
  sync:
    runs-on: ubuntu-latest
    outputs:
      updated: ${{ steps.sync.outputs.updated }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Sync with Upstream
        id: sync
        run: |
          # Configure Git Identity
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
          # Fetch upstream data
          git remote add upstream https://github.com/williamcachamwri/zalo-tg.git
          git fetch upstream main
          
          # Compare your fork to the upstream
          LOCAL_COMMIT=$(git rev-parse HEAD)
          UPSTREAM_COMMIT=$(git rev-parse upstream/main)
          
          if [ "$LOCAL_COMMIT" != "$UPSTREAM_COMMIT" ]; then
            echo "Updates found in upstream. Merging..."
            
            # Merge upstream into your fork
            git merge upstream/main --no-edit
            
            # Push changes to your fork
            git push origin main
            
            echo "updated=true" >> $GITHUB_OUTPUT
          else
            echo "Fork is already up-to-date."
            echo "updated=false" >> $GITHUB_OUTPUT
          fi

  build-and-push:
    needs: sync
    if: needs.sync.outputs.updated == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main 

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Multi-Arch Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/zalo-tg:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max